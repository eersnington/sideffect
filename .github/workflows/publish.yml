name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm Trusted Publishing requires npm >= 11.5.1 and Node >= 22.14.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Check sideffect
        working-directory: packages/sideffect
        run: bun run check

      - name: Test sideffect
        working-directory: packages/sideffect
        run: bun run test

      # Build before publish so npm validates package.json after bin targets exist.
      - name: Build sideffect
        working-directory: packages/sideffect
        run: bun run build

      - name: Run Cloudflare workflow E2E
        run: bun run test:e2e

      - name: Publish sideffect (OIDC, no token)
        working-directory: packages/sideffect
        run: npm publish --provenance
